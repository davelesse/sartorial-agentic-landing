user nginx;
worker_processes 1;
error_log /var/log/nginx/error.log warn;

events { worker_connections 256; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream frontend { server frontend:3000; }
    upstream backend  { server backend:8000;  }

    server {
        listen 80;
        server_name localhost;

        location /health { return 200 'OK'; add_header Content-Type text/plain; }
        location /api/   { proxy_pass http://backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
        location /       { proxy_pass http://frontend; proxy_set_header Host $host; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    }
}
